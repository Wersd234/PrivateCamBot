version: '3.8'

services:
  rog_ai_guardian:
    build:
      context: .
      dockerfile: Dockerfile
      network: host

    # 👇 注意：这里彻底删除了 image: 这一行！
    container_name: rog_ai_guardian
    restart: always
    network_mode: "host"
    environment:
      - TZ=Australia/Melbourne
      - RTSP_URL=${RTSP_URL}
      - ROG_IP=${ROG_IP}
      - MAC_ADDRESS=${MAC_ADDRESS}
      - AWAY_TIME_LIMIT=${AWAY_TIME_LIMIT}
      - TOLERANCE=${TOLERANCE}
      - PC_USER=${PC_USER}
      - PC_PASS=${PC_PASS}