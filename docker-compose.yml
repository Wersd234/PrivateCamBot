version: '3.8'

services:
  rog_ai_guardian:
    build:
      context: .
      dockerfile: Dockerfile
      network: host
    image: smart-wol-cam:latest  # 永远使用 latest，极致干净！
    container_name: rog_ai_guardian
    restart: always
    network_mode: "host"
    environment:
      # 锁定物理时区，确保 7-23 点免打扰逻辑完美生效
      - TZ=Australia/Melbourne

      - RTSP_URL=${RTSP_URL}
      - ROG_IP=${ROG_IP}
      - MAC_ADDRESS=${MAC_ADDRESS}
      - AWAY_TIME_LIMIT=${AWAY_TIME_LIMIT}
      - TOLERANCE=${TOLERANCE}
      - PC_USER=${PC_USER}
      - PC_PASS=${PC_PASS}